# ============================================================
# INTEGRATION NOTES
# ============================================================

integration_notes:
  taxonomy_yaml: >
    New domains should be added to taxonomy/subjects.yaml under the 'categories'
    key alongside existing 10 domains. Each new subject needs a corresponding
    entry in SUBJECT_DESCRIPTIONS in question_gen.py for custom question generation.

  subject_mapping: >
    Add aliases for new subjects as needed (e.g., 'reasoning' → causal_reasoning,
    'creative_writing' → storytelling, 'system_design' → system_design).

  question_generation: >
    The existing generate_custom_questions() function generates 4 MCQ per subject
    from descriptions. For deeper evaluation, consider adding LLM-generated questions
    for these more complex subjects — the deterministic 4-question template may be
    insufficient for Advanced_Reasoning and Mathematical_Reasoning subjects.

  mmlu_overlap: >
    Some new subjects overlap with existing MMLU subjects (e.g., formal_logic ↔
    propositional_logic/first_order_logic, machine_learning ↔ transformer_architecture).
    The existing MMLU subjects should be kept for backward compatibility and dataset
    questions. New subjects probe deeper and use custom question generation.

  phased_rollout: >
    Recommended implementation order based on benchmark impact:
      Phase 1: Advanced_Reasoning, Mathematical_Reasoning, Code_Engineering
        (highest benchmark differentiation, directly fills HLE/AIME/SWE-bench gaps)
      Phase 2: Agentic_Capabilities, AI_ML_Knowledge, Multimodal_Understanding
        (covers GAIA, MMMU, and ML knowledge gaps)
      Phase 3: Scientific_Reasoning, Long_Context_Retrieval, Natural_Language_Understanding
        (fills remaining cognitive gaps)
      Phase 4: Creative_Tasks, Real_World_Knowledge, Instruction_Following_Alignment
        (breadth coverage, less benchmark pressure but valuable for DPO training)

  testing: >
    After adding each phase, run:
      cd /Users/cyber521k/MindForge && /opt/homebrew/bin/python3.11 -m pytest tests/ -v --tb=short
    Add domain expansion tests in tests/test_domain_expansion.py following the
    existing test patterns for the 10-domain taxonomy.
