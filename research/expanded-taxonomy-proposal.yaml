# MindForge Expanded Taxonomy Proposal
# ========================================
# Research Date: 2026-06-27
# Status: PROPOSAL — not yet integrated into taxonomy/subjects.yaml
#
# Context:
#   MindForge currently has 110 subjects across 10 domains (57 MMLU + 53 custom).
#   Original MMLU benchmarks (GSM8K, MMLU, HellaSwag) are saturated — frontier
#   models score >88% on MMLU, >95% on HellaSwag, >94% on GPQA Diamond.
#   This proposal expands the taxonomy to match 2026 frontier LLM intelligence
#   levels, targeting capabilities that still differentiate top models:
#   - Humanity's Last Exam (HLE): best model ~45%, human experts ~90%
#   - SWE-bench Pro/SEAL: best model ~46% (vs 81% on saturated SWE-bench Verified)
#   - ARC-AGI-3: frontier LLMs <1%
#   - GAIA agentic: ~75% (humans 92%)
#   - Multimodal reasoning (EMMA, MMMU): significant gaps remain
#
# Design Principles:
#   1. Every new domain maps to a capability gap visible in 2026 benchmarks
#   2. Subjects are granular enough for targeted probing but broad enough for
#      question generation (5-15 subjects per domain, matching MMLU granularity)
#   3. Subject names use snake_case to match existing taxonomy convention
#   4. Each subject includes a description suitable for question_gen.py
#   5. Existing 10 domains are preserved — new domains are additive
#   6. Cross-domain subjects (e.g., "mathematical_reasoning") live in their
#      primary domain, not duplicated across domains
#
# Proposed Structure: 22 domains (10 existing + 12 new), ~260 subjects total
# New domains add ~150 subjects

meta:
  proposal_date: "2026-06-27"
  current_state:
    domains: 10
    subjects: 110
    mmlu_subjects: 57
    custom_subjects: 53
  proposed_state:
    domains: 22
    subjects: ~260
    new_domains: 12
    new_subjects: ~150
  research_sources:
    - "Kili Technology: AI Benchmarks 2026"
    - "Medium (Milind Nair): LLM Evaluation in 2026"
    - "LLM Stats: AI Benchmarks 2026"
    - "DataVLab: LLM Benchmarks 2026"
    - "Iternal AI: LLM Selection Guide 2026"
    - "HuggingFace: Open LLM Leaderboard"
    - "Center for AI Safety: Humanity's Last Exam (Nature, Jan 2026)"
    - "OpenAI: SWE-bench Pro / SEAL audit"
    - "Epoch AI: LiveCodeBench"
    - "ARC Prize: ARC-AGI-3"

