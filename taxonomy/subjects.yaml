subject_descriptions:
  propositional_logic: Formal logic using propositional calculus — truth tables, logical equivalences, De Morgan's laws, modus
    ponens/tollens, resolution, CNF/DNF conversion, satisfiability (SAT), and proving validity of logical arguments. Tests
    symbolic manipulation and rule application.
  first_order_logic: Predicate logic with quantifiers (∀, ∃), predicates, functions, and constants. Covers unification, skolemization,
    Herbrand's theorem, resolution refutation, and translating natural language to FOL. Tests formal reasoning about relations
    and quantification.
  causal_reasoning: Reasoning about cause and effect — identifying causal relationships from observational data, counterfactual
    reasoning, do-calculus, causal graphs (DAGs), confounders, mediators, and Simpson's paradox. Tests understanding of causation
    vs. correlation.
  analogical_reasoning: Mapping relational structure from a source domain to a target domain. Includes proportional analogies
    (A:B::C:D), structural alignment, surface vs. deep similarity, and analogical transfer in problem-solving. Tests abstract
    pattern matching across disparate domains.
  abductive_reasoning: Inference to the best explanation — given observations, determine the most likely explanation. Covers
    hypothesis generation, Occam's razor, eliminative abduction, and diagnostic reasoning. Tests ability to form plausible
    explanations from incomplete information.
  inductive_reasoning: Generalizing from specific instances to broader rules. Covers pattern completion, sequence extrapolation,
    analogical series, Raven's Progressive Matrices, and the problem of induction. Tests ability to identify and apply patterns
    from limited examples — directly relevant to ARC-AGI.
  deductive_reasoning: Drawing logically certain conclusions from premises. Covers syllogisms, conditional reasoning, proof
    by contradiction, and multi-step logical chains. Tests ability to follow valid inference rules without content-based shortcuts.
  spatial_reasoning: Mental manipulation of 2D and 3D spatial relationships — mental rotation, folding/unfolding, cross-sections,
    mirror images, topological reasoning, and navigation. Tests non-verbal reasoning critical for multimodal and embodied
    AI.
  temporal_reasoning: Reasoning about time — event ordering, duration, Allen's interval algebra, temporal constraints, before/after/during
    relationships, and planning with deadlines. Tests understanding of temporal sequences and causality.
  counterfactual_reasoning: Reasoning about alternative realities — 'what if X had been different?' Covers nearest-possible-world
    semantics, causal counterfactuals, structural causal models, and counterfactual evaluation in decision theory.
  nonmonotonic_reasoning: Reasoning where conclusions can be retracted with new information — default logic, circumscription,
    autoepistemic logic, and defeasible reasoning. Tests handling of incomplete and revisable knowledge, critical for real-world
    agent decision-making.
  combinatorial_reasoning: Systematic enumeration and counting of discrete structures — permutations, combinations, generating
    functions, inclusion-exclusion, Pigeonhole principle, and graph enumeration. Tests ability to reason about discrete structures
    and count possibilities.
  constraint_satisfaction: Solving problems with variables subject to constraints — CSP formulation, backtracking, constraint
    propagation, arc consistency, and real-world scheduling/packing problems. Tests systematic search and optimization.
  abstract_pattern_induction: Discovering hidden rules from examples and applying them to novel cases — the core of ARC-AGI.
    Covers grid-based pattern tasks, rule induction from input-output pairs, abstraction and generalization. Tests the ability
    to learn novel abstractions from very few examples.
  tool_selection: Choosing the right tool for a task from an available set. Covers understanding tool descriptions, matching
    tool capabilities to task requirements, composing tool sequences, and recognizing when no suitable tool exists. Tests
    the core decision of 'which tool to call.'
  function_calling: Constructing valid API/function calls — parameter extraction from natural language, type matching, argument
    ordering, JSON schema compliance, handling optional/required parameters, and error recovery from malformed calls. Tests
    practical API interaction.
  multi_step_planning: Decomposing a complex goal into an ordered sequence of sub-tasks. Covers goal decomposition, dependency
    analysis, plan representation (DAGs, trees), plan revision on failure, and trade-offs between plan depth and reliability.
    Tests the planning phase of agent loops.
  plan_execution: Executing a plan step-by-step while monitoring progress and handling failures. Covers state tracking, step
    verification, error recovery strategies (retry, replan, skip), and knowing when to stop. Tests the act-observe-reflect
    loop of autonomous agents.
  self_reflection: Evaluating one's own outputs and processes — detecting errors in prior reasoning, recognizing knowledge
    gaps, calibrating confidence, and deciding when to seek external help. Tests metacognitive abilities critical for autonomous
    operation.
  error_recovery: Recovering from execution failures — diagnosing error causes, trying alternative approaches, handling rate
    limits/timeouts, and graceful degradation. Tests resilience and adaptive behavior when plans fail.
  multi_agent_coordination: Coordinating with other agents or humans — task delegation, role assignment, communication protocols,
    shared state management, conflict resolution, and result aggregation. Tests collaborative intelligence.
  web_navigation: Navigating web interfaces to accomplish tasks — understanding page structure, clicking elements, filling
    forms, handling popups/auth, pagination, and extracting information. Tests Browser-Use and web-agent capabilities (WebArena,
    GAIA web tasks).
  file_system_operations: Managing files and directories programmatically — reading/writing files, path manipulation, glob
    patterns, searching file contents, permissions, and directory traversal. Tests terminal-based agent skills.
  code_execution_safety: Executing generated code safely — sandboxing, understanding side effects, resource limits, output
    capture, and knowing when execution is dangerous. Tests judgment about code safety in agent contexts.
  state_management: Maintaining and updating state across multi-step interactions — context window management, state persistence,
    session tracking, memory retrieval, and deciding what to remember vs. forget. Tests long-horizon task management.
  environment_perception: Understanding the current environment state — parsing API responses, reading logs, interpreting
    terminal output, understanding error messages, and building a mental model of the operating context. Tests the observe
    phase of agent loops.
  task_decomposition: Breaking complex tasks into independently solvable sub-tasks — identifying parallelizable vs. sequential
    components, defining clear sub-task boundaries, and estimating sub-task difficulty. Tests problem structuring abilities.
  human_in_the_loop: Knowing when and how to ask humans for help — recognizing ambiguity that requires clarification, formulating
    good questions, presenting options clearly, and incorporating human feedback. Tests the boundary between autonomy and
    human escalation.
  agent_tool_composition: Combining multiple tools in novel ways to solve problems not solvable by any single tool — chaining
    outputs, parallel tool calls, conditional tool selection, and building workflows. Tests creative tool use.
  system_design: Designing software systems architecture — choosing patterns (MVC, microservices, event-driven), defining
    component interfaces, data flow diagrams, scalability considerations, CAP theorem trade-offs, and technology selection.
    Tests high-level engineering judgment.
  api_design: Designing RESTful and GraphQL APIs — resource modeling, HTTP methods, status codes, versioning, pagination,
    authentication, rate limiting, and OpenAPI specification. Tests ability to design clean interfaces.
  database_design: Designing database schemas — normalization (1NF-BCNF), indexing strategies, relationships (1:1, 1:N, M:N),
    partitioning, choosing SQL vs. NoSQL, and query optimization. Tests data modeling and storage reasoning.
  debugging_strategies: Systematic approaches to finding and fixing bugs — binary search debugging, hypothesis-driven debugging,
    reading stack traces, using debuggers (pdb, gdb, Chrome DevTools), and root cause analysis. Tests diagnostic reasoning
    about code failures.
  code_review: Evaluating code quality — identifying bugs, security vulnerabilities, performance issues, maintainability problems,
    style violations, and suggesting improvements. Tests ability to read and critique code critically, as in GitHub PR reviews.
  testing_strategies: Designing effective tests — unit testing, integration testing, property-based testing, mocking, test
    coverage analysis, TDD workflows, edge case identification, and choosing what to test. Tests quality assurance reasoning.
  refactoring: Improving code structure without changing behavior — extracting methods, simplifying conditionals, eliminating
    duplication, renaming for clarity, design pattern application, and managing technical debt. Tests code transformation
    skills.
  performance_optimization: Identifying and fixing performance bottlenecks — algorithmic complexity analysis, profiling, memory
    optimization, caching strategies, database query optimization, and latency reduction. Tests ability to reason about speed
    and resource usage.
  design_patterns: Software design patterns — creational (Factory, Builder, Singleton), structural (Adapter, Decorator, Facade),
    behavioral (Observer, Strategy, Command), and architectural patterns (MVC, Repository, CQRS). Tests knowledge of reusable
    engineering solutions.
  concurrency_programming: Writing concurrent and parallel code — threads, locks, mutexes, semaphores, race conditions, deadlocks,
    async/await, actors model, and concurrent data structures. Tests reasoning about parallel execution.
  distributed_systems: Designing distributed systems — consensus algorithms (Paxos, Raft), replication, partition tolerance,
    distributed transactions, eventual consistency, leader election, and fault tolerance. Tests understanding of multi-node
    system challenges.
  code_security: Identifying security vulnerabilities in code — SQL injection, XSS, CSRF, path traversal, deserialization
    attacks, dependency vulnerabilities, and OWASP Top 10. Tests ability to spot security flaws during code review and avoid
    them in new code.
  build_systems: Understanding build tools and dependency management — Make, CMake, Bazel, Gradle, Maven, npm/pnpm, pip, cargo,
    and monorepo build strategies. Tests knowledge of compilation pipelines and dependency resolution.
  version_control_workflows: Git workflows and collaboration — branching strategies (GitFlow, trunk-based), merge vs. rebase,
    conflict resolution, cherry-picking, bisect for debugging, submodules, and PR lifecycle. Tests practical version control
    reasoning.
  code_generation_from_spec: Generating working code from natural language specifications or pseudocode — understanding requirements,
    choosing appropriate data structures, handling edge cases, and producing compilable code. Tests the core capability measured
    by HumanEval and LiveCodeBench.
  transformer_architecture: Deep understanding of Transformer architecture — self-attention, multi-head attention, positional
    encoding, layer normalization, feed-forward networks, encoder-decoder vs. decoder-only, and variants (RoPE, ALiBi, sliding
    window attention). Tests architectural knowledge.
  training_methodology: LLM training pipeline — pretraining (tokenization, data mixing, scaling laws, batch size, learning
    rate schedules), post-training (SFT, DPO, RLHF, PPO, GRPO), and curriculum learning. Tests understanding of how models
    are built.
  fine_tuning_techniques: Parameter-efficient fine-tuning — LoRA, QLoRA, adapters, prefix tuning, prompt tuning, full fine-tuning
    trade-offs, and instruction tuning. Tests knowledge of adapting pretrained models to specific tasks.
  evaluation_metrics: Metrics for evaluating LLMs — perplexity, BLEU, ROUGE, exact match, F1, MMLU/GPQA benchmarking, human
    evaluation, LLM-as-judge, and calibration metrics. Tests understanding of how to measure model quality.
  model_quantization: Reducing model precision for efficient deployment — INT8, INT4, GPTQ, AWQ, GGUF, bitsandbytes, and trade-offs
    between speed, memory, and quality. Tests knowledge of inference optimization.
  inference_optimization: Making LLM inference faster and cheaper — KV caching, speculative decoding, batching, vLLM, tensor
    parallelism, pipeline parallelism, and PagedAttention. Tests understanding of serving infrastructure.
  reinforcement_learning: RL fundamentals and LLM applications — MDPs, policy gradient, PPO, reward modeling, RLHF, DPO, GRPO,
    and alignment tax. Tests understanding of preference optimization and alignment methods.
  data_curation: Preparing training data — data deduplication, quality filtering, toxic content removal, synthetic data generation,
    data augmentation, and dataset contamination detection. Tests knowledge of data pipeline design.
  model_safety_alignment: Making models safe and aligned — red teaming, jailbreak prevention, constitutional AI, safety filters,
    RLHF for harmlessness, refusal training, and safety evals. Tests understanding of AI safety practices.
  ai_ethics: Ethical considerations in AI — bias and fairness, transparency, accountability, privacy, consent, intellectual
    property, environmental impact, and AI governance frameworks. Tests reasoning about ethical implications of AI deployment.
  multimodal_architectures: Vision-language models and multimodal AI — CLIP, BLIP, LLaVA, Flamingo, vision encoders, cross-attention
    fusion, and unified multimodal models. Tests understanding of architectures that process multiple modalities.
  rag_systems: Retrieval-Augmented Generation — document chunking, embedding models, vector databases (Pinecone, Weaviate,
    Chroma), retrieval strategies (dense, sparse, hybrid), reranking, and context window management. Tests knowledge of RAG
    pipeline design.
  prompt_engineering: Designing effective prompts — zero-shot, few-shot, chain-of-thought, self-consistency, tree-of-thought,
    role-playing, system prompts, and prompt templates. Tests practical prompt optimization skills.
  agent_architecture: Designing LLM-based agent systems — ReAct loop, plan-and-execute, reflection, memory systems, tool integration,
    multi-agent orchestration, and human-in-the-loop patterns. Tests understanding of agent design.
  image_understanding: Interpreting visual content in images — object detection, scene understanding, spatial relationships,
    OCR, reading charts/graphs, and understanding diagrams. Tests VLM capabilities for static images.
  video_understanding: Understanding temporal dynamics in video — action recognition, temporal reasoning, causal chains across
    frames, summarizing video content, and answering questions about video events. Tests temporal multimodal reasoning.
  audio_understanding: Processing and understanding audio — speech recognition, speaker identification, emotion detection,
    music analysis, sound classification, and audio event detection. Tests audio-language model capabilities.
  chart_data_visualization: Reading and interpreting data visualizations — bar charts, line graphs, scatter plots, heatmaps,
    pie charts, reading axes, identifying trends, and comparing data across visualizations. Tests quantitative visual literacy.
  document_understanding: Understanding structured documents — tables, forms, multi-column layouts, headers/footers, reading
    order, and extracting information from complex document layouts. Tests document AI capabilities (DocVQA).
  cross_modal_reasoning: Reasoning that requires integrating information across modalities — matching text to images, answering
    questions that require both visual and textual understanding, and cross-modal analogies. Tests EMMA-style organic multimodal
    reasoning.
  spatial_visual_reasoning: 3D reasoning from 2D images — depth estimation, object orientation, spatial relationships (above/below/behind),
    mental rotation from visual input, and scene reconstruction. Tests 3D understanding from 2D.
  visual_question_answering: Answering natural language questions about images — identifying objects, counting, spatial reasoning,
    attribute identification, and multi-hop reasoning over visual content. Tests VQA pipeline capabilities.
  diagrammatic_reasoning: Reasoning with diagrams — flowcharts, circuit diagrams, UML, ER diagrams, mind maps, and deriving
    conclusions from visual structural representations. Tests ability to reason with structured visual notation.
  scene_understanding: Holistic scene understanding — identifying the setting, activities, relationships between objects and
    people, emotional context, and narrative implication of a visual scene. Tests higher-order visual comprehension beyond
    object detection.
  multimodal_generation: Generating content across modalities — text-to-image, image editing, text-to-video, audio generation,
    and understanding the quality and limitations of generated multimodal content. Tests generative AI literacy.
  optical_character_understanding: Reading text in natural images and documents — handwriting recognition, text in the wild
    (signs, labels), multi-language OCR, and structured text extraction from images. Tests text-vision intersection.
  information_retrieval: Finding relevant information in large text corpora — keyword search, semantic search, dense retrieval,
    BM25, hybrid search, and evaluating retrieval precision/recall. Tests ability to locate relevant information.
  context_window_management: Managing limited context windows — summarizing long documents, selecting relevant passages, context
    ordering effects, lost-in-the-middle phenomenon, and context compression. Tests understanding of context constraints.
  multi_document_synthesis: Synthesizing information from multiple sources — identifying contradictions, merging complementary
    information, resolving entity references, and producing a coherent summary. Tests multi-source reasoning.
  needle_in_haystack: Finding specific information embedded in a large context — recalling a fact placed at various positions
    in a long document, and understanding how retrieval accuracy degrades with context length. Tests long-context retrieval
    precision.
  citation_verification: Verifying that claims are supported by cited sources — checking if information appears in the referenced
    source, detecting fabricated citations, and ensuring faithful attribution. Tests source-grounding.
  long_document_summarization: Summarizing long documents effectively — extractive vs. abstractive summarization, hierarchical
    summarization, preserving key information, and avoiding hallucination in summaries. Tests compression fidelity.
  rag_pipeline_reasoning: End-to-end RAG reasoning — query understanding, retrieval strategy selection, context relevance
    evaluation, answer faithfulness checking, and knowing when retrieval is needed vs. using parametric knowledge.
  temporal_context_reasoning: Reasoning about temporal information in context — understanding timelines, resolving temporal
    references, tracking entity state changes over time in a document, and answering when/while/before/after questions.
  cross_reference_resolution: Resolving references across a long context — pronoun resolution, entity tracking, acronym expansion,
    and connecting information mentioned in different parts of a document. Tests coreference in long contexts.
  fact_verification: Verifying claims against provided source material — checking if statements are supported, contradicted,
    or not mentioned in the context, and identifying subtle mismatches. Tests grounded fact-checking.
  storytelling: Constructing narratives — plot structure (three-act, hero's journey), pacing, tension, narrative arcs, foreshadowing,
    and payoff. Tests ability to create engaging, coherent long-form stories.
  poetry_composition: Writing poetry with formal constraints — meter (iambic, trochaic), rhyme schemes (ABAB, sonnet, villanelle),
    syllable counting, and integrating meaning with form. Tests constrained creative writing.
  dialogue_writing: Writing natural dialogue — character voice differentiation, subtext, conversational flow, dialect/sociolect,
    and advancing plot through speech. Tests ability to create distinct, believable character voices.
  creative_nonfiction: Writing engaging factual narratives — personal essays, memoir, literary journalism, narrative hooks,
    and balancing factual accuracy with storytelling craft. Tests creative writing grounded in reality.
  world_building: Designing fictional worlds — magic systems, political structures, geography, economics, cultures, and internal
    consistency. Tests systematic creative imagination and coherence.
  character_development: Creating complex characters — motivation, arc, flaws, relationships, voice consistency, and growth.
    Tests understanding of character psychology and narrative purpose.
  humor_and_satire: Writing comedy — timing, misdirection, wordplay, irony, satire, parody, and understanding comedic structure.
    Tests one of the hardest creative tasks for LLMs.
  persuasive_writing: Writing to persuade — argumentation, rhetorical devices (ethos, pathos, logos), audience analysis, counter-argument
    handling, and call-to-action. Tests rhetoric and influence through writing.
  descriptive_prose: Writing vivid descriptions — sensory details, figurative language (metaphor, simile, personification),
    show-don't-tell, and atmosphere creation. Tests literary craft and imagery.
  genre_conventions: Understanding and applying genre conventions — science fiction, fantasy, mystery, horror, romance, literary
    fiction. Tests knowledge of genre expectations and ability to work within or subvert them.
  creative_constraints: Writing under formal or content constraints — Oulipo techniques, lipograms, constrained vocabularies,
    acrostics, and found poetry. Tests creative problem-solving under restrictions.
  narrative_structure: Understanding narrative structure techniques — non-linear timelines, frame stories, unreliable narrators,
    parallel plots, and in medias res. Tests structural storytelling knowledge.
  current_events: Knowledge of recent world events — geopolitics, elections, natural disasters, scientific breakthroughs,
    and major news stories. Tests temporal knowledge and awareness of post-training events.
  pop_culture: Knowledge of popular culture — movies, TV shows, music, internet trends, memes, viral content, and cultural
    phenomena. Tests cultural literacy and contemporary relevance.
  sports_knowledge: Knowledge of sports — rules, teams, players, statistics, championships, major leagues (NFL, NBA, MLB,
    Premier League, etc.), and historical records. Tests sports domain knowledge.
  entertainment_industry: Knowledge of the entertainment industry — film studios, streaming platforms, production companies,
    award ceremonies, and industry trends. Tests understanding of entertainment business.
  music_knowledge: Knowledge of music — genres, artists, albums, music theory basics, instruments, music history, and charts.
    Tests broad musical literacy.
  film_and_television: Knowledge of cinema and TV — directors, actors, plot summaries, production details, film techniques,
    and critical analysis. Tests audiovisual cultural knowledge.
  video_game_culture: Knowledge of video games — game titles, developers, platforms, genres, gaming culture, esports, and
    industry trends. Tests gaming domain knowledge.
  internet_culture: Knowledge of internet culture — social media platforms, viral trends, online communities, memes, internet
    history, and platform-specific norms. Tests digital cultural literacy.
  celebrity_knowledge: Knowledge of public figures — actors, musicians, athletes, politicians, influencers, and their notable
    activities and relationships. Tests biographical and cultural knowledge.
  food_and_cuisine: Knowledge of food and cooking — cuisines by region, ingredients, cooking techniques, culinary traditions,
    and food culture. Tests practical cultural knowledge.
  travel_and_geography: Knowledge of travel destinations, landmarks, cultural practices by region, transportation, and practical
    geography. Tests world knowledge for real-world planning.
  fashion_and_lifestyle: Knowledge of fashion brands, trends, style history, and lifestyle culture. Tests awareness of consumer
    and design culture.
  algebraic_reasoning: Algebraic manipulation and reasoning — solving equations, inequalities, polynomials, factoring, quadratic
    equations, systems of equations, and algebraic identities. Tests core algebraic problem-solving.
  geometric_reasoning: Geometric problem-solving — Euclidean geometry proofs, area/volume calculations, coordinate geometry,
    trigonometric identities, and geometric transformations. Tests spatial-mathematical reasoning.
  number_theory: Properties of integers — divisibility, primes, modular arithmetic, Diophantine equations, Fermat's Little
    Theorem, GCD/LCM, and the fundamental theorem of arithmetic. Tests number-theoretic reasoning.
  combinatorics: Counting and arrangement — permutations, combinations, generating functions, recurrence relations, inclusion-exclusion,
    and graph theory basics. Tests discrete mathematical reasoning.
  probability_theory: Probability reasoning — Bayes' theorem, conditional probability, random variables, expected value, distributions,
    and combinatorial probability. Tests probabilistic thinking.
  mathematical_proofs: Constructing and verifying mathematical proofs — direct proof, proof by induction, proof by contradiction,
    proof by cases, and understanding what constitutes a valid proof. Tests formal mathematical reasoning.
  competition_mathematics: Problems from mathematical olympiads — AMC, AIME, Putnam, and IMO-style problems requiring creative
    insight, non-standard techniques, and multi-step reasoning. Tests the hardest math benchmarks (AIME/IMO level).
  real_analysis: Calculus and analysis — limits, continuity, derivatives, integrals, sequences and series, convergence tests,
    and the formal foundations of calculus. Tests rigorous mathematical analysis.
  linear_algebra: Vector spaces, matrices, linear transformations, eigenvalues/eigenvectors, determinants, inner product spaces,
    and SVD. Tests understanding of linear structures critical for ML and engineering.
  discrete_mathematics: Discrete structures — set theory, relations, functions, graph theory, Boolean algebra, logic, and
    combinatorial structures. Tests reasoning about discrete objects.
  mathematical_optimization: Optimization theory — linear programming, convex optimization, gradient descent, Lagrange multipliers,
    and constrained optimization. Tests ability to find optima in mathematical settings.
  differential_equations: Ordinary and partial differential equations — first-order ODEs, second-order linear ODEs, systems
    of ODEs, boundary value problems, and modeling physical systems with differential equations. Tests continuous modeling.
  applied_mathematics: Applying mathematics to real-world problems — mathematical modeling, numerical methods, dimensional
    analysis, scaling, approximation, and mathematical physics. Tests practical mathematical reasoning.
  experimental_design: Designing valid experiments — hypothesis formulation, control groups, randomization, sample size, blinding,
    confounding variables, and factorial designs. Tests ability to design rigorous scientific studies.
  hypothesis_testing: Statistical hypothesis testing — null/alternative hypotheses, p-values, Type I/II errors, power analysis,
    t-tests, ANOVA, chi-square, and multiple testing corrections. Tests inferential statistics reasoning.
  data_interpretation: Interpreting scientific data — reading tables, interpreting graphs, identifying trends, recognizing
    data quality issues, distinguishing correlation from causation, and drawing valid conclusions. Tests quantitative reasoning
    from data.
  scientific_method: Understanding the scientific method — observation, hypothesis, prediction, experimentation, analysis,
    peer review, and replication. Tests knowledge of how scientific knowledge is produced and validated.
  research_methodology: Research methods across disciplines — qualitative vs. quantitative, survey design, sampling methods,
    longitudinal vs. cross-sectional, case studies, and meta-analysis. Tests understanding of research design.
  statistical_inference: Drawing conclusions from data — confidence intervals, Bayesian inference, maximum likelihood estimation,
    regression analysis, and model selection. Tests statistical reasoning beyond basic hypothesis testing.
  causal_inference: Determining causation from data — randomized controlled trials, natural experiments, instrumental variables,
    difference-in-differences, and propensity score matching. Tests ability to distinguish causal effects from observational
    data.
  scientific_modeling: Building and evaluating scientific models — model assumptions, simplification, validation, sensitivity
    analysis, and understanding limitations. Tests ability to reason about scientific abstractions.
  literature_review: Synthesizing scientific literature — identifying key papers, understanding citation networks, resolving
    conflicting findings, and identifying research gaps. Tests scientific information synthesis.
  peer_review: Understanding the peer review process — evaluating manuscript quality, identifying methodological flaws, suggesting
    improvements, and understanding publication bias. Tests ability to critically evaluate scientific claims.
  reproducibility: Scientific reproducibility and replicability — understanding the replication crisis, open science practices,
    pre-registration, and factors that affect reproducibility. Tests understanding of scientific reliability.
  scientific_communication: Communicating scientific findings — writing papers, creating figures, explaining complex concepts
    to non-experts, and presenting data. Tests ability to convey scientific knowledge clearly and accurately.
  reading_comprehension: Understanding written text — extracting information, answering questions, making inferences, identifying
    main ideas, and understanding implicit information. Tests foundational text understanding.
  natural_language_inference: Determining logical relationships between sentences — entailment, contradiction, and neutral.
    Covers RTE, SNLI, and multi-premise inference. Tests ability to reason about semantic relationships.
  coreference_resolution: Resolving pronouns and noun phrases to their referents — identifying antecedents, handling ambiguity,
    and tracking entities across discourse. Tests discourse-level language understanding.
  sentiment_analysis: Identifying emotions and opinions in text — polarity (positive/negative), intensity, aspect-based sentiment,
    sarcasm detection, and emotion classification. Tests ability to detect subjective content.
  named_entity_recognition: Identifying and classifying entities in text — persons, organizations, locations, dates, and custom
    entity types. Tests information extraction and entity classification skills.
  semantic_role_labeling: Identifying the semantic roles of arguments in a sentence — who did what to whom, when, where, and
    how. Tests understanding of predicate-argument structure and semantic relationships.
  discourse_analysis: Understanding discourse structure — rhetorical relations, discourse markers, coherence, cohesion, and
    multi-sentence reasoning. Tests understanding of how sentences connect to form meaning.
  pragmatics: Understanding meaning in context — implicature, speech acts, presupposition, deixis, and conversational maxims
    (Grice). Tests ability to understand intended meaning beyond literal interpretation.
  summarization_quality: Evaluating and producing summaries — extractive vs. abstractive, faithfulness, coverage, coherence,
    and avoiding hallucination. Tests ability to compress information accurately.
  multilingual_understanding: Understanding and translating across languages — cross-lingual transfer, code-switching, low-resource
    languages, and cultural adaptation. Tests non-English language capabilities.
  format_compliance: Following formatting instructions exactly — JSON, markdown, bullet lists, specific output structures,
    character limits, and field requirements. Tests precise format adherence.
  multi_constraint_following: Satisfying multiple constraints simultaneously — length, content, style, and structural requirements.
    Tests ability to balance competing instructions without dropping any.
  role_playing: Adopting and maintaining a specified persona — character voice, expertise level, tone, behavioral constraints,
    and staying in character. Tests instruction-based persona adherence.
  negative_constraints: Following instructions about what NOT to do — avoiding specific words, topics, structures, or patterns.
    Tests ability to respect exclusions.
  multi_turn_instruction: Maintaining instructions across multiple conversation turns — remembering constraints from earlier
    messages, adapting to updated instructions, and handling contradictory instructions over time. Tests conversational instruction
    persistence.
  safety_guidelines: Following safety guidelines appropriately — refusing harmful requests, providing safety disclaimers,
    and knowing when to refuse vs. when to provide responsible information. Tests safety alignment quality.
  preference_alignment: Understanding and applying human preferences — helpfulness vs. harmlessness trade-offs, tone preferences,
    verbosity calibration, and cultural sensitivity. Tests RLHF-influenced behavior quality.
  task_decomposition_instructions: Following complex multi-step instructions — breaking down compound requests, ordering sub-tasks
    correctly, and producing all requested outputs. Tests ability to handle complex instruction following.
